<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nmiai task feed</title>
    <style>
      :root {
        --page: #f4efe6;
        --ink: #1c1a18;
        --muted: #5f594f;
        --panel: rgba(255, 251, 245, 0.86);
        --line: rgba(28, 26, 24, 0.12);
        --accent: #006d77;
        --accent-soft: rgba(0, 109, 119, 0.12);
        --ok: #1f7a4d;
        --warn: #a45112;
        --shadow: 0 24px 60px rgba(68, 53, 34, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(0, 109, 119, 0.16), transparent 32%),
          radial-gradient(circle at bottom right, rgba(164, 81, 18, 0.16), transparent 28%),
          linear-gradient(180deg, #fbf8f2 0%, var(--page) 100%);
      }

      .shell {
        width: min(1200px, calc(100vw - 32px));
        margin: 32px auto;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .hero {
        display: grid;
        gap: 18px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.82rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 4vw, 4.8rem);
        line-height: 0.94;
        font-weight: 700;
        max-width: 12ch;
      }

      .subhead {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }

      .card {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.5);
      }

      .label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .value {
        font-size: 1.15rem;
      }

      .status-ok {
        color: var(--ok);
      }

      .status-warn {
        color: var(--warn);
      }

      .table-wrap {
        overflow: auto;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 640px;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        text-align: left;
      }

      th {
        position: sticky;
        top: 0;
        background: #f8f4ec;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      td {
        font-family: 'Courier New', monospace;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .empty {
        padding: 32px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .shell {
          margin: 16px auto;
          padding: 18px;
          border-radius: 20px;
        }

        h1 {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Azure Functions + Azure SQL</p>
        <h1>Live task feed</h1>
        <p class="subhead">
          This page refreshes automatically and renders the current rows in the configured
          <strong>tasks</strong> table.
        </p>
      </section>

      <section class="meta">
        <article class="card">
          <span class="label">Connection</span>
          <span class="value" id="connectionState">Loading...</span>
        </article>
        <article class="card">
          <span class="label">Rows</span>
          <span class="value" id="rowCount">0</span>
        </article>
        <article class="card">
          <span class="label">Last refresh</span>
          <span class="value" id="lastRefresh">Waiting for first response</span>
        </article>
      </section>

      <section class="table-wrap">
        <div class="empty" id="emptyState">Loading rows...</div>
        <table id="tasksTable" hidden>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script>
      const POLL_INTERVAL_MS = 5000;
      const connectionState = document.getElementById('connectionState');
      const rowCount = document.getElementById('rowCount');
      const lastRefresh = document.getElementById('lastRefresh');
      const emptyState = document.getElementById('emptyState');
      const tasksTable = document.getElementById('tasksTable');
      const tableHead = document.getElementById('tableHead');
      const tableBody = document.getElementById('tableBody');

      let previousSignature = '';

      function setConnectionState(text, ok) {
        connectionState.textContent = text;
        connectionState.className = ok ? 'value status-ok' : 'value status-warn';
      }

      function toCellText(value) {
        if (value === null || value === undefined) {
          return '';
        }

        if (typeof value === 'object') {
          return JSON.stringify(value);
        }

        return String(value);
      }

      function renderRows(rows) {
        if (!rows.length) {
          tasksTable.hidden = true;
          emptyState.hidden = false;
          emptyState.textContent = 'The tasks table returned no rows.';
          tableHead.innerHTML = '';
          tableBody.innerHTML = '';
          return;
        }

        const columns = Object.keys(rows[0]);
        tableHead.innerHTML = `<tr>${columns.map((column) => `<th>${column}</th>`).join('')}</tr>`;
        tableBody.innerHTML = rows
          .map(
            (row) =>
              `<tr>${columns
                .map((column) => `<td>${escapeHtml(toCellText(row[column]))}</td>`)
                .join('')}</tr>`
          )
          .join('');

        emptyState.hidden = true;
        tasksTable.hidden = false;
      }

      function escapeHtml(text) {
        return text
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function refresh() {
        try {
          const response = await fetch('/tasks?limit=100', { cache: 'no-store' });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.detail || payload.error || 'Request failed');
          }

          const signature = JSON.stringify(payload.rows);

          if (signature !== previousSignature) {
            renderRows(payload.rows);
            previousSignature = signature;
          }

          setConnectionState('Connected', true);
          rowCount.textContent = String(payload.rowCount);
          lastRefresh.textContent = new Date(payload.refreshedAtUtc).toLocaleString();
        } catch (error) {
          setConnectionState('Error', false);
          lastRefresh.textContent = error.message;
          emptyState.hidden = false;
          emptyState.textContent = 'Unable to read the tasks table right now.';
        }
      }

      refresh();
      setInterval(refresh, POLL_INTERVAL_MS);
    </script>
  </body>
</html>
